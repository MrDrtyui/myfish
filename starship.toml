"$schema" = 'https://starship.rs/config-schema.json'

format = """
$os\
$username\
$hostname\
$directory\
$git_branch\
$git_status\
$nodejs\
$golang\
$rust\
$python\
$docker_context\
$kubernetes\
$memory_usage\
$battery\
