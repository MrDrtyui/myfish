[battery]
full_symbol = "≤░Β╣ "
charging_symbol = "≤░ΓΕ "
discharging_symbol = "≤░ΓΔ "
unknown_symbol = "≤░Β╜ "
empty_symbol = "≤░ΓΟ "

[[battery.display]]
threshold = 100
style = "bold green"

[[battery.display]]
threshold = 30
style = "bold yellow"

[[battery.display]]
threshold = 10
style = "bold red"


